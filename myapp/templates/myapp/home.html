<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Analyzer</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f8;
        }

        header {
            background: #111827;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h2 {
            font-size: 22px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 15px;
            padding: 8px 14px;
            border-radius: 6px;
            transition: 0.3s;
        }

        nav a:hover {
            background: #1f2933;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 85vh;
        }

        .card {
            background: white;
            padding: 30px;
            width: 500px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .card h1 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #111827;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            resize: none;
            margin-bottom: 15px;
        }

        .options {
            margin: 15px 0;
            line-height: 28px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            background: #111827;
            color: white;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #000;
        }
    </style>
</head>

<body>

<header>
    <h2>Text Analyzer</h2>
    <nav>
        <a href="/">Home</a>
        <a href="about/">About Us</a>
    </nav>
</header>

<div class="container">
    <div class="card">
        <h1>WELCOME TO THE TEXT ANALYZER</h1>

        <form action="/analyzetext" method="post">{% csrf_token %}
            <textarea name="text" placeholder="Enter your text here..."></textarea>

            <div class="options">
                <input type="checkbox" name="fullcaps"> UPPERCASE<br>
                <input type="checkbox" name="newlineremover"> Remove New Lines<br>
                <input type="checkbox" name="extralineremover"> Remove Extra Spaces<br>
                <input type="checkbox" name="charc"> Count Characters<br>
                <input type="checkbox" name="removepunc"> Remove Punctuations<br>
            </div>

            <button type="submit">Analyze Text</button>
        </form>
    </div>
</div>

</body>
</html>
