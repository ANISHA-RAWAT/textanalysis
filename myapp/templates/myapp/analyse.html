<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Result</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        header {
            background: #111827;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 15px;
            padding: 8px 14px;
            border-radius: 6px;
        }

        nav a:hover {
            background: #1f2933;
        }

        .container {
            max-width: 800px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        h1 {
            margin-bottom: 15px;
            color: #111827;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 6px;
            border: 1px solid #e5e7eb;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<header>
    <h2>Text Analyzer</h2>
    <nav>
        <a href="/">Home</a>
        <a href="about/">About Us</a>
    </nav>
</header>

<div class="container">
    <h1>Your Analyzed Text – {{purpose}}</h1>

    <div class="result-box">
       {{analysed_text}}
    </div>
</div>

</body>
</html>
